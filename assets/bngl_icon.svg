<svg width="128" height="128" viewBox="0 0 128 128" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="128" height="128" rx="24" fill="#005A9E"/>

  <!-- Complex, Random-ish Network Graph at the top -->
  <g fill="white" fill-opacity="0.8">
    <circle cx="30" cy="25" r="4"/>
    <circle cx="50" cy="45" r="3"/>
    <circle cx="80" cy="30" r="5"/>
    <circle cx="100" cy="40" r="3"/>
    <circle cx="65" cy="20" r="4"/>
    <circle cx="45" cy="15" r="2"/>
  </g>
  <g stroke="white" stroke-width="1.5" stroke-opacity="0.4">
    <line x1="30" y1="25" x2="50" y2="45"/>
    <line x1="50" y1="45" x2="80" y2="30"/>
    <line x1="80" y1="30" x2="100" y2="40"/>
    <line x1="65" y1="20" x2="80" y2="30"/>
    <line x1="65" y1="20" x2="30" y2="25"/>
    <line x1="45" y1="15" x2="65" y2="20"/>
  </g>

  <!-- BNG Text in the middle -->
  <text x="64" y="80" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="48" font-weight="900" fill="white" text-anchor="middle" dominant-baseline="middle">BNG</text>

  <!-- Pulse lower with more whitespace -->
  <path d="M25 110 Q45 100 64 110 T103 110" stroke="white" stroke-width="4" stroke-opacity="0.6" stroke-linecap="round"/>
</svg>
